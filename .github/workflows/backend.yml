name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff pytest

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Check imports & syntax
        working-directory: backend
        run: |
          python -c "from app.main import app; print('✓ app imports OK')"
          python -c "from app.models import Ingredient, Recipe, RecipeIngredient; print('✓ models OK')"
          python -c "from app.schemas import IngredientOut, RecipeOut, NITable; print('✓ schemas OK')"

      - name: Run tests
        working-directory: backend
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping"
          fi
